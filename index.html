<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEIC 自分専用単語帳</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select, button {
      font: inherit;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d7dce5;
      border-radius: 10px;
      background: #fff;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      background: #1f6feb;
      color: white;
      font-weight: 700;
    }

    button.secondary {
      background: #e7eefc;
      color: #1f4fbf;
    }

    button.gray {
      background: #eef1f6;
      color: #333;
    }

    button.danger {
      background: #e55353;
    }

    button.success {
      background: #2ea043;
    }

    button.warning {
      background: #d97706;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat {
      background: #f8fafc;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat .num {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .quiz-word {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .quiz-sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 14px;
    }

    .answer-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 14px;
      margin: 14px 0;
      display: none;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #eef1f6;
      color: #555;
      margin-right: 6px;
    }

    .word-item {
      border: 1px solid #e6eaf0;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      background: #fff;
    }

    .word-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .word-title {
      font-size: 20px;
      font-weight: 800;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .hidden {
      display: none;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: #666;
      background: #f8fafc;
      border-radius: 12px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tabs button.active {
      background: #1f6feb;
      color: white;
    }

    .footer-note {
      color: #666;
      font-size: 13px;
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      .grid-2,
      .stats {
        grid-template-columns: 1fr;
      }

      .quiz-word {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TOEIC 自分専用単語帳</h1>
    <p class="muted">分からなかった単語をその場で登録して、苦手だけを効率よく復習できます。</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="home">ホーム</button>
      <button class="tab-btn gray" data-tab="quiz">クイズ</button>
      <button class="tab-btn gray" data-tab="list">単語一覧</button>
    </div>

    <section id="tab-home">
      <div class="card">
        <div class="section-title">
          <h2>クイック登録</h2>
          <span class="muted">最小限の入力でOK</span>
        </div>

        <div class="grid-2">
          <div>
            <label for="wordInput">英単語</label>
            <input id="wordInput" type="text" placeholder="例: confirm" />
          </div>
          <div>
            <label for="meaningInput">意味</label>
            <input id="meaningInput" type="text" placeholder="例: 確認する" />
          </div>
        </div>

        <div style="margin-top: 14px;" class="row">
          <button id="addWordBtn">登録する</button>
          <button id="clearFormBtn" class="secondary">入力をクリア</button>
        </div>

        <div class="footer-note">
          Enterキーでも登録できます。
        </div>
      </div>

      <div class="card">
        <div class="section-title">
          <h2>今日の状況</h2>
          <button id="startQuizBtn" class="success">今日の5問を始める</button>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="num" id="totalCount">0</div>
            <div class="muted">総登録数</div>
          </div>
          <div class="stat">
            <div class="num" id="activeCount">0</div>
            <div class="muted">復習対象</div>
          </div>
          <div class="stat">
            <div class="num" id="archivedCount">0</div>
            <div class="muted">卒業済み</div>
          </div>
          <div class="stat">
            <div class="num" id="todayReviewCount">0</div>
            <div class="muted">今日の回答数</div>
          </div>
        </div>
      </div>
    </section>

    <section id="tab-quiz" class="hidden">
      <div class="card">
        <div class="section-title">
          <h2>クイズ</h2>
          <button id="refreshQuizBtn" class="secondary">別の問題にする</button>
        </div>

        <div id="quizEmpty" class="empty">
          まだ単語がありません。まずはホームから単語を登録してください。
        </div>

        <div id="quizArea" class="hidden">
          <div class="quiz-sub" id="quizModeLabel"></div>
          <div class="quiz-word" id="quizQuestion"></div>
          <div class="small" id="quizHint"></div>

          <div class="answer-box" id="answerBox">
            <div><strong>答え:</strong> <span id="quizAnswer"></span></div>
          </div>

          <div class="row" style="margin-top: 16px;">
            <button id="showAnswerBtn">答えを見る</button>
          </div>

          <div id="reviewButtons" class="row hidden" style="margin-top: 16px;">
            <button id="knowBtn" class="success">覚えた</button>
            <button id="maybeBtn" class="warning">あやしい</button>
            <button id="dontKnowBtn" class="danger">覚えてない</button>
          </div>
        </div>
      </div>
    </section>

    <section id="tab-list" class="hidden">
      <div class="card">
        <div class="section-title">
          <h2>単語一覧</h2>
          <div class="row">
            <input id="searchInput" type="text" placeholder="検索" style="width: 220px;" />
            <select id="filterSelect" style="width: 180px;">
              <option value="all">すべて</option>
              <option value="active">復習対象のみ</option>
              <option value="archived">卒業済みのみ</option>
            </select>
          </div>
        </div>

        <div id="wordList"></div>
      </div>
    </section>
  </div>

  <script src="main.js"></script>
</body>
</html>
